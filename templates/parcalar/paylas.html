<div class="mt-5 mb-4">
    <h6 class="fw-bold text-center mb-3" style="color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.8rem;">Paylaş</h6>
    <div class="d-flex justify-content-center flex-wrap gap-2">
        <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.build_absolute_uri }}"
           target="_blank" rel="noopener" class="btn btn-sm" style="background: #1877f2; color: #fff; border-radius: 50px; padding: 0.4rem 1rem;">
            <i class="bi bi-facebook me-1"></i> Facebook
        </a>
        <a href="https://twitter.com/intent/tweet?url={{ request.build_absolute_uri }}" target="_blank"
           rel="noopener" class="btn btn-sm" style="background: #0f1419; color: #fff; border-radius: 50px; padding: 0.4rem 1rem;">
            <i class="bi bi-twitter-x me-1"></i> X
        </a>
        <a href="https://www.pinterest.com/pin/create/button/?url={{ request.build_absolute_uri }}"
           target="_blank" rel="noopener" class="btn btn-sm" style="background: #e60023; color: #fff; border-radius: 50px; padding: 0.4rem 1rem;">
            <i class="bi bi-pinterest me-1"></i> Pinterest
        </a>
        <a href="https://api.whatsapp.com/send?text={{ request.build_absolute_uri }}" target="_blank"
           rel="noopener" class="btn btn-sm" style="background: #25d366; color: #fff; border-radius: 50px; padding: 0.4rem 1rem;">
            <i class="bi bi-whatsapp me-1"></i> WhatsApp
        </a>
        <a href="https://t.me/share/url?url={{ request.build_absolute_uri }}" target="_blank"
           rel="noopener" class="btn btn-sm" style="background: #2aabee; color: #fff; border-radius: 50px; padding: 0.4rem 1rem;">
            <i class="bi bi-telegram me-1"></i> Telegram
        </a>
    </div>
</div>
